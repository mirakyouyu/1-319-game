<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1/319</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none;-webkit-user-select:none}
.main-ui{display:flex;flex-direction:column;align-items:center;z-index:10;position:relative}
.top{font-size:13px;color:#444;letter-spacing:4px;margin-bottom:10px}
.mode-row{display:flex;gap:8px;margin-bottom:20px}
.mode-row button{background:none;border:1px solid #333;color:#555;padding:5px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}
.mode-row button.on{border-color:#fff;color:#fff}
.players-row{display:flex;gap:6px;margin-bottom:16px;align-items:center;flex-wrap:wrap;justify-content:center}
.players-row button{background:none;border:1px solid #333;color:#666;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;font-family:inherit}
.players-row input{background:#111;border:1px solid #222;color:#fff;padding:6px 8px;border-radius:8px;font-size:14px;width:80px;text-align:center;font-family:inherit}
.players-row input:focus{outline:none;border-color:#444}
.turn-name{font-size:20px;font-weight:700;color:#0ef;margin-bottom:14px;min-height:28px;letter-spacing:1px}
.btn{width:200px;height:200px;border-radius:50%;border:3px solid #e00;background:radial-gradient(circle at 40% 35%,#1a0000,#000);color:#fff;font-size:26px;font-weight:900;font-family:inherit;cursor:pointer;transition:transform .15s;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(220,0,0,.25);animation:glow 2s ease-in-out infinite alternate;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.93)}.btn.disabled{pointer-events:none;opacity:.3;animation:none}
@keyframes glow{from{box-shadow:0 0 30px rgba(220,0,0,.2)}to{box-shadow:0 0 60px rgba(220,0,0,.4)}}
.result{margin-top:24px;font-size:52px;font-weight:900;min-height:64px;letter-spacing:6px}
.result.safe{color:#0f0;text-shadow:0 0 30px rgba(0,255,0,.6)}
.result.dead{color:#f00;text-shadow:0 0 40px rgba(255,0,0,.8);animation:flash .12s 4}
@keyframes flash{50%{opacity:0}}
.stats{margin-top:16px;font-size:13px;color:#444;letter-spacing:2px}
.dots{margin-top:12px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:300px}
.dots i{width:7px;height:7px;border-radius:50%;background:#1a3a1a;display:block}
.dots i.hit{background:#e00;box-shadow:0 0 5px #e00}
.reset{margin-top:16px;background:none;border:1px solid #222;color:#444;padding:5px 18px;border-radius:16px;font-size:11px;cursor:pointer;font-family:inherit}
.reset:hover{border-color:#e00;color:#e00}
.hide{display:none!important}
.stage{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .15s}
.stage.active{opacity:1;pointer-events:auto}
.stage-bg{position:absolute;inset:0}.stage-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;width:100%}
.screen-flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:90;transition:opacity .05s}
.screen-flash.on{opacity:1}
.crack-overlay{position:fixed;inset:0;z-index:88;pointer-events:none;opacity:0;transition:opacity .3s}
.crack-overlay.active{opacity:1}
.death-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:91;font-size:clamp(80px,25vw,160px);font-weight:900;color:#f00;pointer-events:none;opacity:0;text-shadow:0 0 60px rgba(255,0,0,.9),0 0 120px rgba(255,0,0,.5);letter-spacing:12px}
.death-text.active{opacity:1;animation:death-slam .5s ease-out}
@keyframes death-slam{0%{opacity:0;transform:translate(-50%,-50%) scale(5) rotate(-10deg)}50%{opacity:1;transform:translate(-50%,-50%) scale(.85) rotate(3deg)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}
.fake-safe{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:86;font-size:clamp(50px,14vw,90px);font-weight:900;color:#0f0;text-shadow:0 0 40px rgba(0,255,0,.7);letter-spacing:8px;opacity:0;pointer-events:none}
.fake-safe.active{opacity:1;animation:fade-up .3s ease-out}
.at-field{position:fixed;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.at-field.active{opacity:1}
.at-field .hex{width:200px;height:200px;position:absolute;border:2px solid rgba(255,150,0,.6);animation:hex-expand 1.5s ease-out forwards;clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:rgba(255,150,0,.08)}
.at-field .hex:nth-child(2){animation-delay:.15s;width:280px;height:280px}
.at-field .hex:nth-child(3){animation-delay:.3s;width:360px;height:360px;opacity:.6}
@keyframes hex-expand{0%{transform:rotate(30deg) scale(.3);opacity:0}40%{opacity:1}100%{transform:rotate(30deg) scale(1.2);opacity:0}}
.reach-banner{position:fixed;top:50%;left:0;right:0;transform:translateY(-50%);z-index:60;text-align:center;font-size:clamp(36px,10vw,70px);font-weight:900;letter-spacing:8px;padding:20px 0;opacity:0;pointer-events:none}
.reach-banner.show{opacity:1;animation:reach-slam .5s ease-out}
@keyframes reach-slam{0%{opacity:0;transform:translateY(-50%) scaleX(3)}60%{opacity:1;transform:translateY(-50%) scaleX(.95)}100%{opacity:1;transform:translateY(-50%) scaleX(1)}}
.invert-flash{position:fixed;inset:0;z-index:92;pointer-events:none;opacity:0;mix-blend-mode:difference;background:#fff}
.invert-flash.on{opacity:1}
.countdown-overlay{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;background:rgba(0,0,0,.85)}
.countdown-overlay.active{opacity:1}
.countdown-num{font-size:clamp(100px,30vw,200px);font-weight:900;color:#f00;text-shadow:0 0 60px rgba(255,0,0,.8);animation:cd-pop .8s ease-out}
@keyframes cd-pop{0%{transform:scale(3);opacity:0}50%{transform:scale(.9);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes telop-slide{0%{opacity:0;transform:translateX(100vw)}70%{opacity:1;transform:translateX(-10px)}100%{opacity:1;transform:translateX(0)}}
@keyframes telop-slide-left{0%{opacity:0;transform:translateX(-100vw)}70%{opacity:1;transform:translateX(10px)}100%{opacity:1;transform:translateX(0)}}
@keyframes telop-drop{0%{opacity:0;transform:translateY(-100vh)}60%{opacity:1;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes slam-in{0%{opacity:0;transform:scale(4) rotate(-8deg)}60%{opacity:1;transform:scale(.9) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes slam-up{0%{opacity:0;transform:translateY(100px) scale(1.5)}60%{opacity:1;transform:translateY(-5px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink-anim{50%{opacity:.3}}
@keyframes orb-spin{to{transform:rotate(360deg)}}
@keyframes hshake{0%{transform:translate(0)}25%{transform:translate(-8px,6px)}50%{transform:translate(8px,-6px)}75%{transform:translate(-6px,-8px)}100%{transform:translate(6px,8px)}}
@keyframes bousou-flash{0%{background:#000}25%{background:#200010}50%{background:#100020}75%{background:#001020}}
@keyframes push-pulse{to{transform:scale(1.08)}}
@keyframes particle-fly{0%{opacity:1;transform:translate(0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
@keyframes shard-fall{0%{opacity:1;transform:translate(0) rotate(0)}100%{opacity:0;transform:translate(var(--dx),100vh) rotate(var(--rot))}}
@keyframes zoom-in-out{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes glitch{0%{clip-path:inset(20% 0 60% 0);transform:translate(-3px)}20%{clip-path:inset(60% 0 10% 0);transform:translate(3px)}40%{clip-path:inset(40% 0 30% 0);transform:translate(-2px)}60%{clip-path:inset(10% 0 70% 0);transform:translate(2px)}80%{clip-path:inset(50% 0 20% 0);transform:translate(-3px)}100%{clip-path:inset(30% 0 40% 0);transform:translate(3px)}}
.telop{font-size:clamp(20px,6vw,36px);font-weight:900;letter-spacing:4px;white-space:nowrap;opacity:0}
.blink{animation:blink-anim .3s step-end infinite}
.heavy-shake{animation:hshake .06s linear infinite}
.push-btn-wrap{margin-top:30px;opacity:0}
.push-btn-wrap.show{opacity:1;animation:fade-up .3s ease-out}
.push-btn{width:140px;height:140px;border-radius:50%;font-size:22px;font-weight:900;font-family:inherit;cursor:pointer;border:none;color:#fff;animation:push-pulse .5s ease-in-out infinite alternate}
.push-btn.red-btn{background:radial-gradient(circle at 40% 35%,#ff4444,#880000);box-shadow:0 0 30px rgba(255,0,0,.5),0 8px 0 #550000}
.push-btn.gold-btn{background:radial-gradient(circle at 40% 35%,#ffd700,#886600);box-shadow:0 0 30px rgba(255,200,0,.5),0 8px 0 #554400}
.push-btn.rainbow-btn{background:conic-gradient(#f00,#f80,#ff0,#0f0,#0ff,#80f,#f0f,#f00);box-shadow:0 0 40px rgba(255,255,255,.4),0 8px 0 #444;animation:push-pulse .5s ease-in-out infinite alternate,orb-spin 2s linear infinite}
.push-btn:active{transform:scale(.9) translateY(4px)!important;box-shadow:none!important}
.push-label{font-size:14px;color:#aaa;margin-top:10px;letter-spacing:3px;animation:blink-anim .5s step-end infinite}
.particle{position:fixed;border-radius:50%;z-index:87;pointer-events:none;animation:particle-fly 1.2s ease-out forwards}
.shard{position:fixed;z-index:89;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.1);animation:shard-fall var(--dur) ease-in forwards}
</style>
</head>
<body>
<audio id="bgm" src="bgm.mp4" loop preload="auto"></audio>
<div class="screen-flash" id="fR" style="background:#e00"></div>
<div class="screen-flash" id="fW" style="background:#fff"></div>
<div class="screen-flash" id="fG" style="background:#fd0"></div>
<div class="screen-flash" id="fP" style="background:#a0f"></div>
<div class="invert-flash" id="inv"></div>
<div class="crack-overlay" id="crack"></div>
<div class="death-text" id="dTxt">死</div>
<div class="fake-safe" id="fSafe"></div>
<div class="stage" id="stg"><div class="stage-bg" id="sBg"></div><div class="stage-content" id="sCt"></div></div>
<div class="at-field" id="atf"><div class="hex"></div><div class="hex"></div><div class="hex"></div></div>
<div class="reach-banner" id="rBan"></div>
<div class="countdown-overlay" id="cdOv"><div class="countdown-num" id="cdNum"></div></div>

<div class="main-ui">
  <div class="top">1 / <input id="denomInput" value="319" inputmode="numeric" pattern="[0-9]*" style="background:none;border:none;border-bottom:1px solid #444;color:#fff;font-size:13px;font-family:inherit;letter-spacing:4px;width:4em;text-align:center;outline:none;padding:0" onchange="setDenom(this.value)"></div>
  <div class="mode-row"><button class="on" id="m1" onclick="setMode(0)">ソロ</button><button id="m2" onclick="setMode(1)">みんなで</button></div>
  <div class="players-row hide" id="prow"></div>
  <div class="turn-name" id="turn"></div>
  <button class="btn" id="btn" onclick="go()">引く</button>
  <div class="result" id="res"></div>
  <div class="stats" id="st"></div>
  <div class="dots" id="dots"></div>
  <button class="reset" onclick="fullReset()">リセット</button>
</div>

<script>
let multi=false,pc=2,names=[],ci=0,draws=0,hits=0,busy=false;
let denom=319;
function setDenom(v){const n=Math.max(1,Math.min(99999,parseInt(v)||1));denom=n;$('denomInput').value=n;fullReset()}
let lastY=-1,lastR=-1,lastSP=-1,lastC=-1,lastD=-1;
let runId=0; // 演出IDで古い演出をキャンセル検知

const $=id=>document.getElementById(id);
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const pick=a=>a[Math.floor(Math.random()*a.length)];
function pickNew(a,last){if(a.length<=1)return{v:a[0],i:0};let i;do{i=Math.floor(Math.random()*a.length)}while(i===last);return{v:a[i],i}}
const fl=(id,d)=>{const e=$(id);if(!e)return;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),d)};

// === Audio ===
let actx=null;
function aC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx}
function sndClick(){const a=aC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=900;g.gain.setValueAtTime(.25,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.06);o.start();o.stop(a.currentTime+.06)}
function sndReach(){const a=aC();for(let i=0;i<10;i++){const t=a.currentTime+i*.09,b=a.createBuffer(1,Math.floor(a.sampleRate*.07),a.sampleRate),d=b.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*.5;const s=a.createBufferSource(),g=a.createGain();s.buffer=b;s.connect(g);g.connect(a.destination);g.gain.setValueAtTime(.5+i*.04,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);s.start(t)}}
function sndWarning(){const a=aC();for(let i=0;i<5;i++){const t=a.currentTime+i*.28,o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=i%2===0?1000:700;g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);o.start(t);o.stop(t+.22)}}
function sndBeep(){const a=aC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=660;g.gain.setValueAtTime(.3,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.15);o.start();o.stop(a.currentTime+.15)}
function sndBousou(){const a=aC(),b=a.createBuffer(1,Math.floor(a.sampleRate*.7),a.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();f.type='lowpass';f.frequency.value=120;s.buffer=b;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(.9,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.7);s.start()}
function sndPush(){const a=aC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(180,a.currentTime);o.frequency.exponentialRampToValueAtTime(40,a.currentTime+.35);g.gain.setValueAtTime(.7,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.35);o.start();o.stop(a.currentTime+.35)}
function sndDeath(){const a=aC(),b=a.createBuffer(1,Math.floor(a.sampleRate*.6),a.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();f.type='lowpass';f.frequency.value=700;s.buffer=b;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(1,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.6);s.start();const o=a.createOscillator(),og=a.createGain();o.connect(og);og.connect(a.destination);o.frequency.setValueAtTime(90,a.currentTime);o.frequency.exponentialRampToValueAtTime(25,a.currentTime+.5);og.gain.setValueAtTime(.8,a.currentTime);og.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);o.start();o.stop(a.currentTime+.5)}
function sndSafe(){const a=aC();[523,659,784].forEach((freq,i)=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=freq;const t=a.currentTime+i*.12;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.06);g.gain.exponentialRampToValueAtTime(.001,t+.9);o.start(t);o.stop(t+.9)})}

// === 全状態を強制クリーンアップ ===
function cleanupFX(){
  document.body.classList.remove('heavy-shake');
  $('stg').classList.remove('active');
  $('sBg').className='stage-bg';$('sBg').style='';
  $('sCt').innerHTML='';
  $('atf').classList.remove('active');
  $('rBan').classList.remove('show');
  $('cdOv').classList.remove('active');
  $('crack').classList.remove('active');$('crack').innerHTML='';
  $('dTxt').classList.remove('active');
  $('fSafe').classList.remove('active');$('fSafe').style.animation='';
  $('inv').classList.remove('on');
  ['fR','fW','fG','fP'].forEach(id=>$(id).classList.remove('on'));
  // 残留パーティクル・破片を除去
  document.querySelectorAll('.particle,.shard').forEach(e=>e.remove());
}

function unlock(){busy=false;$('btn').classList.remove('disabled')}

// === ゲーム ===
function setMode(m){multi=!!m;$('m1').className=m?'':'on';$('m2').className=m?'on':'';if(multi){$('prow').classList.remove('hide');buildInputs()}else $('prow').classList.add('hide');ci=0;showTurn()}
function buildInputs(){const p=$('prow');p.innerHTML='';const mi=document.createElement('button');mi.textContent='−';mi.onclick=()=>{pc=Math.max(2,pc-1);buildInputs()};p.appendChild(mi);names.length=pc;for(let i=0;i<pc;i++){const inp=document.createElement('input');inp.placeholder=(i+1)+'';inp.value=names[i]||'';inp.oninput=e=>{names[i]=e.target.value;showTurn()};p.appendChild(inp);if(!names[i])names[i]='';}const pl=document.createElement('button');pl.textContent='+';pl.onclick=()=>{pc=Math.min(8,pc+1);buildInputs()};p.appendChild(pl);showTurn()}
function gn(i){return(names[i]&&names[i].trim())||('P'+(i+1))}
function showTurn(){$('turn').textContent=multi?gn(ci)+' の番':''}

function finalResult(hit){
  const res=$('res');draws++;if(hit)hits++;
  const w=multi?gn(ci)+' ':'';
  if(hit){res.textContent=w+'死';res.className='result dead'}
  else{sndSafe();res.textContent=w+'生';res.className='result safe'}
  const d=document.createElement('i');if(hit)d.className='hit';$('dots').prepend(d);
  $('st').textContent=draws+'回 / '+hits+'死';
  if(multi){ci=(ci+1)%pc;showTurn()}
}

// === FX ===
function particles(col,n){for(let i=0;i<n;i++){const p=document.createElement('div');p.className='particle';p.style.background=col;p.style.left='50%';p.style.top='50%';p.style.setProperty('--dx',(Math.random()-.5)*500+'px');p.style.setProperty('--dy',(Math.random()-.5)*500+'px');p.style.width=p.style.height=(2+Math.random()*6)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),1500)}}
function shards(n){for(let i=0;i<n;i++){const s=document.createElement('div');s.className='shard';const sz=10+Math.random()*30;s.style.width=sz+'px';s.style.height=sz*(.5+Math.random())+'px';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*60+'%';s.style.setProperty('--dx',(Math.random()-.5)*200+'px');s.style.setProperty('--rot',(Math.random()*720-360)+'deg');s.style.setProperty('--dur',(1+Math.random()*1.5)+'s');s.style.clipPath=`polygon(${Math.random()*30}% 0%,100% ${Math.random()*40}%,${60+Math.random()*40}% 100%,0% ${60+Math.random()*40}%)`;document.body.appendChild(s);setTimeout(()=>s.remove(),3000)}}
function showCrack(){const el=$('crack'),w=innerWidth,h=innerHeight,cx=w/2+(Math.random()-.5)*w*.3,cy=h/2+(Math.random()-.5)*h*.3;let svg=`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;for(let b=0;b<10;b++){const ang=(Math.PI*2/10)*b+(Math.random()-.5)*.5,len=Math.max(w,h)*(.5+Math.random()*.5);let pts=[[cx,cy]],x=cx,y=cy;for(let s=1;s<=10;s++){x=cx+Math.cos(ang)*len*(s/10)+(Math.random()-.5)*30;y=cy+Math.sin(ang)*len*(s/10)+(Math.random()-.5)*30;pts.push([x,y]);if(Math.random()<.35){const sa=ang+(Math.random()-.5)*1.2,sl=len*.25*Math.random();let sx=x,sy=y,sp=[[sx,sy]];for(let ss=0;ss<3;ss++){sx+=Math.cos(sa)*sl/3+(Math.random()-.5)*15;sy+=Math.sin(sa)*sl/3+(Math.random()-.5)*15;sp.push([sx,sy])}svg+=`<polyline points="${sp.map(p=>p.join(',')).join(' ')}" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="${1+Math.random()}"/>`}}svg+=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="${1.5+Math.random()*2}"/>`}svg+=`</svg>`;el.innerHTML=svg;el.classList.add('active')}

function stgOn(){$('stg').classList.add('active')}
function stgOff(){$('stg').classList.remove('active')}
function stgSet(bg,html){$('sBg').style.background=bg;$('sBg').className='stage-bg';$('sCt').innerHTML=html}

// === Push ===
function pushBtn(cls){
  return new Promise(r=>{
    stgSet('rgba(0,0,0,.92)',`<div class="push-btn-wrap show"><button class="push-btn ${cls}" id="epb">押せ</button><div class="push-label">▼ PUSH ▼</div></div>`);
    stgOn();let d=false;
    const f=()=>{if(d)return;d=true;sndPush();fl('fW',120);stgOff();setTimeout(r,350)};

// ================================================================
// FLOW
// ================================================================
async function flowDeath(myId){
  const ok=()=>myId===runId; // まだ有効か

  const complexity=Math.random();

  // 2% 突然死
  if(complexity<.02){await wait(120);if(!ok())return;await megaDeath();if(ok())finalResult(true);return}
  // 5% 予告即死
  if(complexity<.07){await doYokoku();if(!ok())return;await megaDeath();if(ok())finalResult(true);return}

  // 25% 復活死
  if(Math.random()<.25){
    if(Math.random()<.6){await doYokoku();if(!ok())return}
    await doReach();if(!ok())return;
    if(Math.random()<.4){await doSP();if(!ok())return}
    await revivalDeath();if(ok())finalResult(true);return;
  }

  // 通常死
  await doYokoku();if(!ok())return;
  await doReach();if(!ok())return;
  const spN=complexity<.4?1:complexity<.7?2:3;
  for(let i=0;i<spN;i++){await doSP();if(!ok())return}
  if(Math.random()<.8){await doCutin();if(!ok())return}
  if(Math.random()<.5){await doBousou();if(!ok())return}
  if(Math.random()<.7){
    const bc=Math.random()<.5?'rainbow-btn':Math.random()<.5?'gold-btn':'red-btn';
    await pushBtn(bc);if(!ok())return;
  }
  await megaDeath();
  if(ok())finalResult(true);
}

async function flowSafe(myId){
  const ok=()=>myId===runId;
  const r=Math.random();
  if(r<.78){await wait(120);if(ok())finalResult(false);return}
  if(r<.88){await doYokoku();if(!ok())return;await wait(150);if(ok())finalResult(false);return}
  if(r<.95){await doYokoku();if(!ok())return;await doReach();if(!ok())return;if(Math.random()<.3){await doSP();if(!ok())return}await wait(150);if(ok())finalResult(false);return}
  if(r<.99){await doYokoku();if(!ok())return;await doReach();if(!ok())return;await doSP();if(!ok())return;await doCutin();if(!ok())return;if(Math.random()<.3){await pushBtn('red-btn');if(!ok())return}await wait(150);if(ok())finalResult(false);return}
  // 1% 暴走ガセ
  await doYokoku();if(!ok())return;await doReach();if(!ok())return;await doSP();if(!ok())return;await doBousou();if(!ok())return;await pushBtn(Math.random()<.3?'rainbow-btn':'red-btn');if(!ok())return;await wait(150);if(ok())finalResult(false);
}

function go(){
  if(busy)return;
  busy=true;
  try{startBGM()}catch(e){}
  sndClick();
  $('btn').classList.add('disabled');
  $('res').textContent='';$('res').className='result';
  runId++;
  const myId=runId;
  const hit=Math.floor(Math.random()*denom)===0;
  const flow=hit?flowDeath:flowSafe;
  flow(myId).catch(e=>{console.error('enshutsu error:',e)}).finally(()=>{cleanupFX();unlock()});
}

// === BGM ===
var bgmOn=false;
function startBGM(){if(!bgmOn){try{var a=document.getElementById('bgm');a.volume=0.35;a.play().catch(function(){});bgmOn=true;}catch(e){}}}

function fullReset(){
  runId++; // 走ってる演出を無効化
  cleanupFX();
  draws=0;hits=0;ci=0;
  $('res').textContent='';$('res').className='result';
  $('dots').innerHTML='';$('st').textContent='';
  showTurn();unlock();
}
